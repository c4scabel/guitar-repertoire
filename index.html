<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Repertoire">
  <title>Guitar Repertoire</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --surface3: #2e2e2e;
      --accent: #e8c547;
      --text: #f0f0f0;
      --text-dim: #888;
      --text-muted: #555;
      --danger: #e74c3c;
      --green: #2ecc71;
      --blue: #3498db;
      --orange: #e67e22;
      --border: #2a2a2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      max-width: 480px; margin: 0 auto; min-height: 100%;
    }

    /* ── Header ── */
    .header {
      background: var(--surface); padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
    }
    .header-title { font-size: 17px; font-weight: 700; color: var(--accent); }
    .header-sub { font-size: 13px; color: var(--text-dim); }
    .back-btn {
      background: none; border: none; color: var(--accent);
      font-size: 15px; cursor: pointer; padding: 4px 0;
      display: flex; align-items: center; gap: 5px;
    }

    /* ── Search & Filters ── */
    .search-wrap { padding: 12px 16px 8px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .search-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: 10px; font-size: 15px; outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .filter-row {
      display: flex; gap: 7px; padding: 8px 16px 10px;
      overflow-x: auto; scrollbar-width: none;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .chip {
      padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-dim); cursor: pointer; white-space: nowrap;
    }
    .chip.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* ── Song List ── */
    .song-list { padding: 12px 14px 90px; }
    .song-card {
      background: var(--surface); border-radius: 12px; padding: 14px 15px;
      margin-bottom: 9px; cursor: pointer; border: 1px solid var(--border);
      transition: border-color 0.15s, transform 0.1s;
      display: flex; flex-direction: column; gap: 8px;
    }
    .song-card:active { border-color: var(--accent); transform: scale(0.99); }
    .song-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .song-card-title { font-size: 16px; font-weight: 600; line-height: 1.2; }
    .song-card-artist { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .song-card-bottom { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    /* ── Badges ── */
    .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
    .badge-not-started { background: #2a2a2a; color: var(--text-muted); }
    .badge-learning { background: #3a1f00; color: var(--orange); }
    .badge-can-play { background: #0a2030; color: var(--blue); }
    .badge-perf-ready { background: #082a18; color: var(--green); }
    .badge-key { font-size: 12px; color: var(--text-dim); background: var(--surface2); padding: 3px 9px; border-radius: 10px; }

    /* ── Dots & Stars ── */
    .dots { display: flex; gap: 3px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--surface3); }
    .dot.on { background: var(--accent); }
    .practiced-tag { font-size: 11px; color: var(--text-muted); }
    .stale-tag { font-size: 11px; color: var(--orange); }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 22px; right: 22px; width: 56px; height: 56px;
      border-radius: 50%; background: var(--accent); color: #000; font-size: 30px;
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(232,197,71,0.45); z-index: 200;
    }

    /* ── Empty ── */
    .empty { text-align: center; padding: 64px 24px; color: var(--text-dim); }
    .empty-icon { font-size: 52px; margin-bottom: 14px; }
    .empty p { font-size: 15px; line-height: 1.6; }

    /* ══════════════════════════════════════
       DETAIL VIEW
    ══════════════════════════════════════ */
    .detail-header-block { padding: 16px 16px 0; }
    .detail-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .detail-artist { font-size: 15px; color: var(--text-dim); margin-bottom: 10px; }
    .detail-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

    /* ── Tab bar ── */
    .detail-tabs {
      display: flex; background: var(--surface);
      border-bottom: 2px solid var(--border);
      position: sticky; top: 48px; z-index: 99;
    }
    .dtab {
      flex: 1; padding: 12px 4px; text-align: center;
      font-size: 13px; font-weight: 600; color: var(--text-dim);
      background: none; border: none; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
    }
    .dtab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

    /* ── Tab content ── */
    .tab-pane { padding: 14px 16px 90px; }

    /* ── Shared section card ── */
    .sc { background: var(--surface); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
    .sc-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--accent); font-weight: 700; margin-bottom: 12px; }

    /* ── Overview tab ── */
    .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
    .info-row:last-child { margin-bottom: 0; }
    .info-label { font-size: 14px; color: var(--text-dim); }
    .practiced-line { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; }
    .notes-text { font-size: 14px; line-height: 1.65; }

    /* ── Action buttons ── */
    .action-btn { width: 100%; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn-primary { background: var(--accent); color: #000; border: none; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-green { background: var(--green); color: #000; border: none; }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid #e74c3c33; }

    /* ── Source link rows ── */
    .link-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 13px; background: var(--surface2); border-radius: 10px;
      text-decoration: none; color: var(--text); margin-bottom: 8px;
      border: 1px solid var(--border);
    }
    .link-row:last-child { margin-bottom: 0; }
    .link-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
    .link-body { flex: 1; }
    .link-name { font-size: 14px; font-weight: 600; }
    .link-sub { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
    .link-arrow { color: var(--text-muted); font-size: 18px; }

    /* ══════════════════════════════════════
       CHORD DIAGRAMS
    ══════════════════════════════════════ */
    .chord-grid { display: flex; flex-wrap: wrap; gap: 12px; padding: 4px 0 8px; justify-content: flex-start; }
    .chord-box { display: flex; flex-direction: column; align-items: center; }
    .chord-box-unknown {
      width: 80px; height: 95px; border-radius: 8px;
      border: 1px dashed var(--border); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
    }
    .chord-unknown-name { font-size: 12px; color: var(--text-dim); font-weight: 700; }
    .chord-unknown-q { font-size: 22px; color: var(--text-muted); }
    .no-chords { font-size: 13px; color: var(--text-muted); padding: 8px 0; }

    /* ══════════════════════════════════════
       CHORD CHART (lyrics + chords)
    ══════════════════════════════════════ */
    .cc-wrap { font-family: 'Courier New', monospace; font-size: 12.5px; line-height: 1.55; overflow-x: auto; }
    .cc-section { color: var(--orange); font-weight: 700; display: block; margin-top: 12px; margin-bottom: 2px; font-size: 12px; }
    .cc-chord-line { display: block; white-space: pre; color: var(--text-dim); }
    .cc-chord { color: var(--accent); font-weight: 700; }
    .cc-lyric-line { display: block; white-space: pre; color: var(--text); }
    .cc-gap { display: block; height: 7px; }
    .cc-empty-msg { font-size: 13px; color: var(--text-muted); padding: 8px 0; line-height: 1.6; }

    /* ══════════════════════════════════════
       YOUTUBE EMBED
    ══════════════════════════════════════ */
    .yt-wrap { margin-bottom: 12px; }
    .yt-wrap iframe { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 10px; display: block; }
    .yt-hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.5; }

    /* ══════════════════════════════════════
       TAB CONTENT (monospace text)
    ══════════════════════════════════════ */
    .tab-text-box {
      background: var(--surface2); border-radius: 8px; padding: 12px;
      font-family: 'Courier New', monospace; font-size: 11.5px; color: var(--text);
      overflow-x: auto; white-space: pre; line-height: 1.7;
      max-height: 420px; overflow-y: auto; border: 1px solid var(--border);
    }
    .tab-empty-msg { font-size: 13px; color: var(--text-muted); padding: 8px 0; line-height: 1.6; }

    /* ══════════════════════════════════════
       FORM
    ══════════════════════════════════════ */
    .form-wrap { padding: 16px 16px 90px; }
    .form-group { margin-bottom: 15px; }
    .form-label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 7px; font-weight: 600; }
    .form-input, .form-select, .form-textarea {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 12px 13px; border-radius: 9px;
      font-size: 15px; font-family: inherit; outline: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-textarea.mono { font-family: 'Courier New', monospace; font-size: 13px; min-height: 140px; }
    .form-select option { background: var(--surface); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .star-row { display: flex; gap: 6px; }
    .star { font-size: 26px; background: none; border: none; cursor: pointer; padding: 2px; line-height: 1; color: var(--text-muted); }
    .star.on { color: var(--accent); }
    .divider { height: 1px; background: var(--border); margin: 6px 0 16px; }
    .form-section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--orange); font-weight: 700; margin-bottom: 12px; }
  </style>
</head>
<body>
<div id="app"></div>
<script>

// ════════════════════════════════════════════
//  CHORD DATABASE
// ════════════════════════════════════════════
// frets: [E, A, D, G, B, e] — -1 = mute, 0 = open, n = fret number
// baseFret: lowest fret shown (1 = at nut)
// barre: { fret, from, to } — string indices (0=E, 5=e)
const CHORD_DB = {
  // ── MAJOR ──
  'C':   {b:1, f:[-1,3,2,0,1,0],    fn:[0,3,2,0,1,0]},
  'D':   {b:1, f:[-1,-1,0,2,3,2],   fn:[0,0,0,1,3,2]},
  'E':   {b:1, f:[0,2,2,1,0,0],     fn:[0,2,3,1,0,0]},
  'F':   {b:1, f:[1,3,3,2,1,1],     fn:[1,3,4,2,1,1], br:{fret:1,from:0,to:5}},
  'G':   {b:1, f:[3,2,0,0,0,3],     fn:[3,2,0,0,0,4]},
  'A':   {b:1, f:[-1,0,2,2,2,0],    fn:[0,0,1,2,3,0]},
  'B':   {b:2, f:[-1,2,4,4,4,2],    fn:[0,1,3,4,2,1], br:{fret:2,from:1,to:5}},
  // ── MINOR ──
  'Cm':  {b:3, f:[-1,3,5,5,4,3],    fn:[0,1,3,4,2,1], br:{fret:3,from:1,to:5}},
  'Dm':  {b:1, f:[-1,-1,0,2,3,1],   fn:[0,0,0,2,3,1]},
  'Em':  {b:1, f:[0,2,2,0,0,0],     fn:[0,2,3,0,0,0]},
  'Fm':  {b:1, f:[1,3,3,1,1,1],     fn:[1,3,4,1,1,1], br:{fret:1,from:0,to:5}},
  'Gm':  {b:3, f:[3,5,5,3,3,3],     fn:[1,3,4,1,1,1], br:{fret:3,from:0,to:5}},
  'Am':  {b:1, f:[-1,0,2,2,1,0],    fn:[0,0,2,3,1,0]},
  'Bm':  {b:2, f:[-1,2,4,4,3,2],    fn:[0,1,3,4,2,1], br:{fret:2,from:1,to:5}},
  // ── SHARPS/FLATS MAJOR ──
  'C#':  {b:4, f:[-1,4,6,6,6,4],    fn:[0,1,3,4,2,1], br:{fret:4,from:1,to:5}},
  'Db':  {b:4, f:[-1,4,6,6,6,4],    fn:[0,1,3,4,2,1], br:{fret:4,from:1,to:5}},
  'D#':  {b:6, f:[-1,6,8,8,8,6],    fn:[0,1,3,4,2,1], br:{fret:6,from:1,to:5}},
  'Eb':  {b:6, f:[-1,6,8,8,8,6],    fn:[0,1,3,4,2,1], br:{fret:6,from:1,to:5}},
  'F#':  {b:2, f:[2,4,4,3,2,2],     fn:[1,3,4,2,1,1], br:{fret:2,from:0,to:5}},
  'Gb':  {b:2, f:[2,4,4,3,2,2],     fn:[1,3,4,2,1,1], br:{fret:2,from:0,to:5}},
  'G#':  {b:4, f:[4,6,6,5,4,4],     fn:[1,3,4,2,1,1], br:{fret:4,from:0,to:5}},
  'Ab':  {b:4, f:[4,6,6,5,4,4],     fn:[1,3,4,2,1,1], br:{fret:4,from:0,to:5}},
  'A#':  {b:1, f:[-1,1,3,3,3,1],    fn:[0,1,3,4,2,1], br:{fret:1,from:1,to:5}},
  'Bb':  {b:1, f:[-1,1,3,3,3,1],    fn:[0,1,3,4,2,1], br:{fret:1,from:1,to:5}},
  // ── SHARPS/FLATS MINOR ──
  'C#m': {b:4, f:[-1,4,6,6,5,4],    fn:[0,1,3,4,2,1], br:{fret:4,from:1,to:5}},
  'Dbm': {b:4, f:[-1,4,6,6,5,4],    fn:[0,1,3,4,2,1], br:{fret:4,from:1,to:5}},
  'D#m': {b:6, f:[-1,6,8,8,7,6],    fn:[0,1,3,4,2,1], br:{fret:6,from:1,to:5}},
  'Ebm': {b:6, f:[-1,6,8,8,7,6],    fn:[0,1,3,4,2,1], br:{fret:6,from:1,to:5}},
  'F#m': {b:2, f:[2,4,4,2,2,2],     fn:[1,3,4,1,1,1], br:{fret:2,from:0,to:5}},
  'Gbm': {b:2, f:[2,4,4,2,2,2],     fn:[1,3,4,1,1,1], br:{fret:2,from:0,to:5}},
  'G#m': {b:4, f:[4,6,6,4,4,4],     fn:[1,3,4,1,1,1], br:{fret:4,from:0,to:5}},
  'Abm': {b:4, f:[4,6,6,4,4,4],     fn:[1,3,4,1,1,1], br:{fret:4,from:0,to:5}},
  'A#m': {b:1, f:[-1,1,3,3,2,1],    fn:[0,1,3,4,2,1], br:{fret:1,from:1,to:5}},
  'Bbm': {b:1, f:[-1,1,3,3,2,1],    fn:[0,1,3,4,2,1], br:{fret:1,from:1,to:5}},
  // ── 7THS ──
  'C7':  {b:1, f:[-1,3,2,3,1,0],    fn:[0,3,2,4,1,0]},
  'D7':  {b:1, f:[-1,-1,0,2,1,2],   fn:[0,0,0,2,1,3]},
  'E7':  {b:1, f:[0,2,0,1,0,0],     fn:[0,2,0,1,0,0]},
  'G7':  {b:1, f:[3,2,0,0,0,1],     fn:[3,2,0,0,0,1]},
  'A7':  {b:1, f:[-1,0,2,0,2,0],    fn:[0,0,2,0,3,0]},
  'B7':  {b:1, f:[-1,2,1,2,0,2],    fn:[0,2,1,3,0,4]},
  // ── POWER CHORDS ──
  'E5':  {b:1, f:[0,2,2,-1,-1,-1],  fn:[0,1,2,0,0,0]},
  'F5':  {b:1, f:[1,3,3,-1,-1,-1],  fn:[1,3,4,0,0,0]},
  'F#5': {b:2, f:[2,4,4,-1,-1,-1],  fn:[1,3,4,0,0,0]},
  'G5':  {b:3, f:[3,5,5,-1,-1,-1],  fn:[1,3,4,0,0,0]},
  'G#5': {b:4, f:[4,6,6,-1,-1,-1],  fn:[1,3,4,0,0,0]},
  'Ab5': {b:4, f:[4,6,6,-1,-1,-1],  fn:[1,3,4,0,0,0]},
  'A5':  {b:1, f:[-1,0,2,2,-1,-1],  fn:[0,0,1,2,0,0]},
  'A#5': {b:1, f:[-1,1,3,3,-1,-1],  fn:[0,1,3,4,0,0]},
  'Bb5': {b:1, f:[-1,1,3,3,-1,-1],  fn:[0,1,3,4,0,0]},
  'B5':  {b:2, f:[-1,2,4,4,-1,-1],  fn:[0,1,3,4,0,0]},
  'C5':  {b:3, f:[-1,3,5,5,-1,-1],  fn:[0,1,3,4,0,0]},
  'D5':  {b:1, f:[-1,-1,0,2,3,-1],  fn:[0,0,0,1,3,0]},
};

// ════════════════════════════════════════════
//  CHORD SVG RENDERER
// ════════════════════════════════════════════
function chordSVG(name) {
  const chord = CHORD_DB[name];
  if (!chord) {
    return `<div class="chord-box">
      <div class="chord-box-unknown">
        <div class="chord-unknown-name">${name}</div>
        <div class="chord-unknown-q">?</div>
      </div>
    </div>`;
  }

  // Layout constants
  const sx = [10, 22, 34, 46, 58, 70]; // string x positions (6 strings, 12px apart)
  const fy0 = 32;   // fretboard top y
  const fs = 14;    // fret spacing
  const nf = 4;     // frets shown
  const W = 80, H = 96;
  const els = [];

  // Chord name
  els.push(`<text x="${W/2}" y="11" text-anchor="middle" font-size="11" fill="#f0f0f0" font-weight="700">${name}</text>`);

  // Nut (thick bar) or fret number
  if (chord.b === 1) {
    els.push(`<rect x="${sx[0]-1}" y="${fy0-4}" width="${sx[5]-sx[0]+2}" height="4" fill="#bbb" rx="1"/>`);
  } else {
    els.push(`<text x="${sx[0]-4}" y="${fy0 + fs*0.65}" text-anchor="end" font-size="8" fill="#777">${chord.b}fr</text>`);
    els.push(`<line x1="${sx[0]}" y1="${fy0}" x2="${sx[5]}" y2="${fy0}" stroke="#555" stroke-width="1.5"/>`);
  }

  // Fret lines
  for (let f = 1; f <= nf; f++) {
    const y = fy0 + f * fs;
    els.push(`<line x1="${sx[0]}" y1="${y}" x2="${sx[5]}" y2="${y}" stroke="#333" stroke-width="1"/>`);
  }

  // String lines
  for (let s = 0; s < 6; s++) {
    els.push(`<line x1="${sx[s]}" y1="${fy0}" x2="${sx[s]}" y2="${fy0 + nf*fs}" stroke="#444" stroke-width="1"/>`);
  }

  // Barre bar
  if (chord.br) {
    const bRel = chord.br.fret - chord.b;
    const by = fy0 + bRel * fs + fs / 2;
    const bx1 = sx[chord.br.from], bx2 = sx[chord.br.to];
    els.push(`<rect x="${bx1}" y="${by-5}" width="${bx2-bx1}" height="10" rx="5" fill="#e8c547"/>`);
  }

  // Finger dots
  for (let s = 0; s < 6; s++) {
    const fret = chord.f[s];
    if (fret <= 0) continue;
    // Skip if barre covers this string at this fret
    if (chord.br && fret === chord.br.fret && s >= chord.br.from && s <= chord.br.to) continue;
    const relFret = fret - chord.b;
    const cx = sx[s];
    const cy = fy0 + relFret * fs + fs / 2;
    els.push(`<circle cx="${cx}" cy="${cy}" r="5" fill="#e8c547"/>`);
    const finger = chord.fn ? chord.fn[s] : 0;
    if (finger > 0) {
      els.push(`<text x="${cx}" y="${cy+3.5}" text-anchor="middle" font-size="7" fill="#000" font-weight="bold">${finger}</text>`);
    }
  }

  // Mute (×) / Open (○) markers above strings
  for (let s = 0; s < 6; s++) {
    const fret = chord.f[s];
    const x = sx[s];
    if (fret === -1) {
      els.push(`<text x="${x}" y="${fy0-7}" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">✕</text>`);
    } else if (fret === 0) {
      els.push(`<circle cx="${x}" cy="${fy0-10}" r="4" fill="none" stroke="#777" stroke-width="1.5"/>`);
    }
  }

  return `<div class="chord-box"><svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${els.join('')}</svg></div>`;
}

// ════════════════════════════════════════════
//  CHORD EXTRACTION
// ════════════════════════════════════════════
function extractChords(song) {
  const text = [song.verse, song.chorus, song.bridge].filter(Boolean).join(' ');
  const pat = /\b([A-G][#b]?(?:m(?:aj)?|sus[24]?|dim|aug|add\d+|\d+)?)\b/g;
  const seen = new Set();
  const result = [];
  let m;
  while ((m = pat.exec(text)) !== null) {
    const c = m[1];
    if (!seen.has(c)) { seen.add(c); result.push(c); }
  }
  return result;
}

// ════════════════════════════════════════════
//  CHORD CHART RENDERER
// ════════════════════════════════════════════
const CHORD_PAT = /\b([A-G][#b]?(?:m(?:aj)?|sus[24]?|dim|aug|add\d+|\d+)?)\b/g;

function isChordLine(line) {
  const trimmed = line.trim();
  if (!trimmed) return false;
  const tokens = trimmed.split(/\s+/).filter(Boolean);
  if (!tokens.length) return false;
  const cp = /^[A-G][#b]?(?:m(?:aj)?|sus[24]?|dim|aug|add\d+|\d+)?$/;
  return tokens.filter(t => cp.test(t)).length / tokens.length >= 0.6;
}

function renderChordChart(text) {
  if (!text || !text.trim()) return '';
  return '<div class="cc-wrap">' + text.split('\n').map(line => {
    if (!line.trim()) return '<span class="cc-gap"></span>';
    if (/^\[.+\]$/.test(line.trim()))
      return `<span class="cc-section">${line.trim()}</span>`;
    if (isChordLine(line)) {
      const hl = line.replace(/([A-G][#b]?(?:m(?:aj)?|sus[24]?|dim|aug|add\d+|\d+)?)/g,
        '<span class="cc-chord">$1</span>');
      return `<span class="cc-chord-line">${hl}</span>`;
    }
    return `<span class="cc-lyric-line">${line}</span>`;
  }).join('') + '</div>';
}

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || DEFAULT_SONGS; }
  catch { return DEFAULT_SONGS; }
}
function save(songs) { localStorage.setItem(STORAGE_KEY, JSON.stringify(songs)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function daysSince(d) {
  if (!d) return null;
  return Math.floor((Date.now() - new Date(d).getTime()) / 86400000);
}
function q(artist, title) { return encodeURIComponent(`${artist} ${title}`); }
function getYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/watch\?.*v=|youtu\.be\/|youtube\.com\/embed\/)([^?&\s]+)/);
  return m ? m[1] : null;
}

function statusBadge(status) {

  return `<span class="badge ${map[status]||'badge-not-started'}">${status}</span>`;

function dots(n, max=5) {
  return `<div class="dots">${Array.from({length:max},(_,i)=>`<div class="dot${i<n?' on':''}"></div>`).join('')}</div>`;

// ── LIST ──────────────────────────────────
function viewList() {
  const FILTERS = ['All','Not Started','Learning','Can Play','Performance Ready'];
  const filtered = S.songs.filter(s => {
    const mf = S.filter==='All' || s.status===S.filter;
    const ms = !S.search || s.title.toLowerCase().includes(S.search.toLowerCase()) || s.artist.toLowerCase().includes(S.search.toLowerCase());
    return mf && ms;
  });

  const chips = FILTERS.map(f => `<button class="chip${S.filter===f?' active':''}" data-filter="${f}">${f}</button>`).join('');

  let cards = '';
  if (!filtered.length) {
    cards = `<div class="empty"><div class="empty-icon">🎸</div><p>${S.songs.length===0?'No songs yet.\nTap + to add your first.':'No songs match this filter.'}</p></div>`;
  } else {
    cards = filtered.map(s => {
      const days = daysSince(s.lastPracticed);
      let pt = '';
      if (days===null) pt='';
      else if (days===0) pt=`<span class="practiced-tag">Today</span>`;
      else if (days>=14) pt=`<span class="stale-tag">⚠ ${days}d ago</span>`;
      else pt=`<span class="practiced-tag">${days}d ago</span>`;
      return `<div class="song-card" data-id="${s.id}">
        <div class="song-card-top">
          <div><div class="song-card-title">${s.title}</div><div class="song-card-artist">${s.artist}</div></div>
          ${dots(s.guitarDiff)}
        </div>
        <div class="song-card-bottom">
          ${statusBadge(s.status)}
          ${s.key?`<span class="badge-key">${s.key}${s.capo?' · Capo '+s.capo:''}</span>`:''}
          ${pt}
        </div>
      </div>`;
    }).join('');
  }

  return `
    <div class="header">
      <span class="header-title">🎸 Repertoire</span>
      <span class="header-sub">${S.songs.length} song${S.songs.length!==1?'s':''}</span>
    </div>
    <div class="search-wrap"><input class="search-input" id="search" placeholder="Search songs or artists…" value="${S.search}"></div>
    <div class="filter-row">${chips}</div>
    <div class="song-list">${cards}</div>
    <button class="fab" id="fab">+</button>`;
}

// ════════════════════════════════════════════
//  RENDER + EVENTS
// ════════════════════════════════════════════
function render() {
  document.getElementById('app').innerHTML =
    S.view==='list' ? viewList() :
    S.view==='detail' ? viewDetail() :
    viewForm();
  bind();
}

function bind() {
  // ── LIST events ──
  document.querySelectorAll('.song-card').forEach(c =>
    c.addEventListener('click', () => { S.selectedId=c.dataset.id; S.detailTab='overview'; S.view='detail'; render(); })
  );
  document.querySelectorAll('.chip').forEach(c =>
    c.addEventListener('click', () => { S.filter=c.dataset.filter; render(); })
  );
  const si = document.getElementById('search');
  if (si) si.addEventListener('input', e => { S.search=e.target.value; render(); });
  document.getElementById('fab')?.addEventListener('click', () => {
    S.editId=null; S.formDraft={}; S.view='form'; render();
  });

  // ── DETAIL events ──
  document.querySelectorAll('.dtab').forEach(t =>
    t.addEventListener('click', () => { S.detailTab=t.dataset.tab; render(); })
  );
  document.getElementById('back')?.addEventListener('click', () => {
    if (S.view==='form' && S.editId) { S.view='detail'; }
    else { S.view='list'; }
    S.formDraft={}; render();
  });
  document.getElementById('edit-btn')?.addEventListener('click', () => {
    S.editId=S.selectedId; S.formDraft={}; S.view='form'; render();
  });
  document.getElementById('practiced-btn')?.addEventListener('click', () => {
    const s = S.songs.find(x => x.id===S.selectedId);
    if (s) { s.lastPracticed=new Date().toISOString().split('T')[0]; save(S.songs); render(); }
  });
  document.getElementById('delete-btn')?.addEventListener('click', () => {
    const s = S.songs.find(x => x.id===S.selectedId);
    if (s && confirm(`Delete "${s.title}"?`)) {
      S.songs=S.songs.filter(x => x.id!==S.selectedId);
      save(S.songs); S.view='list'; render();
    }
  });

  // ── FORM events — stars ──
  document.querySelectorAll('.star').forEach(btn => {
    btn.addEventListener('click', () => {
      const field=btn.dataset.field, val=parseInt(btn.dataset.star);
      S.formDraft[field]=val;
      document.getElementById(`f-${field}`).value=val;
      document.querySelectorAll(`.star[data-field="${field}"]`).forEach((b,i) => {
        b.textContent=i<val?'★':'☆'; b.classList.toggle('on',i<val);
      });
    });
  });

  // ── FORM events — save ──
  document.getElementById('save-btn')?.addEventListener('click', () => {
    const title=document.getElementById('f-title').value.trim();
    const artist=document.getElementById('f-artist').value.trim();
    if (!title||!artist) { alert('Title and Artist are required.'); return; }

    const data = {
      title, artist,
      key: document.getElementById('f-key').value.trim(),
      capo: document.getElementById('f-capo').value.trim(),
      tuning: document.getElementById('f-tuning').value.trim()||'Standard',
      status: document.getElementById('f-status').value,
      verse: document.getElementById('f-verse').value.trim(),
      chorus: document.getElementById('f-chorus').value.trim(),
      bridge: document.getElementById('f-bridge').value.trim(),
      strumming: document.getElementById('f-strumming').value.trim(),
      guitarDiff: parseInt(document.getElementById('f-guitarDiff').value)||0,
      vocalDiff: parseInt(document.getElementById('f-vocalDiff').value)||0,
      chordChart: document.getElementById('f-chordChart').value,
      tabContent: document.getElementById('f-tabContent').value,
      customChordUrl: document.getElementById('f-customChordUrl').value.trim(),
      customTabUrl: document.getElementById('f-customTabUrl').value.trim(),
      tutorialUrl: document.getElementById('f-tutorialUrl').value.trim(),
      notes: document.getElementById('f-notes').value.trim(),
    };

    if (S.editId) {
      const idx=S.songs.findIndex(s=>s.id===S.editId);
      S.songs[idx]={...S.songs[idx],...data};
      S.selectedId=S.editId; S.view='detail';
    } else {
      const ns={id:uid(),lastPracticed:null,...data};
      S.songs.push(ns); S.selectedId=ns.id; S.view='detail';
    }
    S.editId=null; S.formDraft={};
    save(S.songs); render();
  });
}

// ════════════════════════════════════════════
//  SERVICE WORKER
// ════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

render();
</script>
</body>
</html>
